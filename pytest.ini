[pytest]
minversion = 8.0
addopts = -ra --strict-markers
testpaths = tests
markers =
    ui: tests that validate the browser application with Selenium WebDriver
    api: tests that validate HTTP API behavior with requests
    e2e: end-to-end tests that cover a complete user journey across layers
    business_rule: tests that validate domain-specific betting rules
    validation: negative or boundary validation checks
    critical: highest-priority tests that protect core product or business risk
    smoke: high-value checks for core application availability
    regression: broader checks for existing behavior
    xdist_group(name): tests that share mutable state and must stay on the same parallel worker
